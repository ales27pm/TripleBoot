name: shellcheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n scripts/tripleboot_aio.sh

      - name: ShellCheck advisory note
        run: echo "ShellCheck is intentionally advisory for this UI-only PR; bash syntax remains the hard gate."
